name: Automating image push to AWS ECR with oidc

on: [push]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_ACCOUNT_ID: 111810594106
      WORK_DIR: terraform/infra/envs/prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::111810594106:role/ecs-push
          aws-region: eu-west-2

      - name: terraform lint download
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.52.0
          cache: true

      - name: terraform lint
        run: |
          cd $WORK_DIR
          tflint --init
          tflint --run
          echo "TFLint completed for $WORK_DIR"

      - name: terraform apply
        run: |
          cd $WORK_DIR
          terraform apply --auto-approve
